<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Master AI | Educational Sandbox</title>
    <!-- Main Styles -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg-dark: #0f172a;
            --surface-dark: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: sans-serif, Arial, Helvetica, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
        }

        .wrapper {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
        }

        /* Sidebar Implementation */
        .sidebar {
            width: 320px;
            background: var(--surface-dark);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            /* backdrop-filter: blur(20px); */
            /* z-index: 100; */
            height: 100vh;
            overflow-y: auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .knowledge-map {
            flex: 1;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .category-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            height: 80px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .status-dot.online {
            background: var(--accent);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        /* Message Styling */
        .message-row {
            display: flex;
            gap: 20px;
            max-width: 85%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user .avatar {
            background: var(--primary);
            color: white;
        }

        .ai .avatar {
            background: var(--surface-dark);
            border: 1px solid var(--glass-border);
            color: var(--primary);
        }

        .bubble {
            background: var(--surface-dark);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1rem;
            position: relative;
        }

        .user .bubble {
            background: var(--primary);
            border: none;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            border-bottom-left-radius: 4px;
        }

        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Thinking Block */
        .thinking-block {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
        }

        .thinking-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            cursor: pointer;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .thinking-details {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-muted);
            display: none;
        }

        .thinking-details.show {
            display: block;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-item {
            background: var(--glass);
            padding: 8px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .stat-value {
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        /* Input Area */
        .input-area {
            padding: 40px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface-dark);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 16px;
            font-size: 1rem;
            outline: none;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h1>Learning Master AI</h1>
                    <span>Edu Sandbox v2.0</span>
                </div>
            </div>

            <div class="knowledge-map">
                <div class="section-title">
                    <span>Knowledge Map</span>
                </div>
                <div class="category-list" id="categoryList">
                    <!-- Powered by JS -->
                    <div class="category-item">
                        <div class="category-info">
                            <span>Loading metrics...</span>
                        </div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 40px;">
                    <span>System Stats</span>
                </div>
                <div class="category-list">
                    <div class="category-item">
                        <div class="category-info">
                            <span>Total Patterns</span>
                            <span id="statPatterns">-</span>
                        </div>
                    </div>
                    <div class="category-item">
                        <div class="category-info">
                            <span>Memory Usage</span>
                            <span id="statMemory">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="chat-header">
                <div class="server-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting to Brain...</span>
                </div>
                <div class="header-actions">
                    <span id="responseTime"
                        style="color: var(--accent); font-family: monospace; font-size: 0.8rem;"></span>
                </div>
            </header>

            <div class="chat-messages" id="chatBucket">
                <div class="message-row ai">
                    <div class="avatar">AI</div>
                    <div class="bubble">
                        Hello! I'm ready to explore Node.js and AI with you.
                        Ask me any question or explore the knowledge map on the left to see how I "think"!
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBucket = document.getElementById('chatBucket');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const responseTime = document.getElementById('responseTime');

        // Initial setup
        async function init() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                if (data.status === 'ok') {
                    statusDot.classList.add('online');
                    statusText.innerText = 'Neural Engine Online';
                    updateKnowledgeMap();
                }
            } catch (e) {
                statusText.innerText = 'Engine Offline';
            }
        }

        async function updateKnowledgeMap() {
            try {
                const res = await fetch('/api/capabilities');
                const data = await res.json();
                const map = data.knowledgeMap;

                document.getElementById('statPatterns').innerText = data.patterns;
                document.getElementById('statMemory').innerText = '~' + Math.round(data.patterns * 1.5) + ' KB';

                const list = document.getElementById('categoryList');
                list.innerHTML = '';

                const total = map.totalDocuments;
                map.categories.forEach(cat => {
                    const pct = Math.round((cat.count / total) * 100);
                    const item = document.createElement('div');
                    item.className = 'category-item';
                    item.innerHTML = `
                        <div class="category-info">
                            <span>${cat.name}</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${pct}%"></div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch (e) { console.error(e); }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            const start = Date.now();
            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                const data = await res.json();

                responseTime.innerText = (Date.now() - start) + 'ms';
                addMessage(data.answer, 'ai', data.thinking);
            } catch (e) {
                addMessage('Error connecting to the Brain...', 'ai');
            }
        }

        function addMessage(text, sender, thinking = null) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;

            let thinkingHtml = '';
            if (thinking && thinking.confidence !== undefined) {
                const keywords = thinking.keywords.slice(0, 5).map(k => `<span class="tag">${k}</span>`).join('');
                const intents = thinking.intent.map(i => `<span class="tag" style="color:var(--accent)">${i.intent}</span>`).join('');
                const candidates = thinking.candidates.map(c =>
                    `<div style="font-size:0.7rem; margin-bottom:4px">🎯 <b>${Math.round(c.similarity * 100)}%</b>: ${c.input.slice(0, 40)}...</div>`
                ).join('');

                thinkingHtml = `
                    <div class="thinking-block">
                        <div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle('show')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                            Thought Process
                        </div>
                        <div class="thinking-details">
                            <div class="stat-grid">
                                <div class="stat-item">
                                    <span class="stat-label">Confidence</span>
                                    <span class="stat-value">${Math.round(thinking.confidence * 100)}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Primary Intent</span>
                                    <span class="stat-value">${thinking.intent[0]?.intent || 'None'}</span>
                                </div>
                            </div>
                            <div style="margin-bottom:12px">
                                <span class="stat-label">Top Keywords</span>
                                <div class="tag-cloud">${keywords}</div>
                            </div>
                            <div>
                                <span class="stat-label">Matching Candidates</span>
                                ${candidates}
                            </div>
                        </div>
                    </div>
                `;
            }

            // Simple markdown-ish bold replacement
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            row.innerHTML = `
                <div class="avatar">${sender === 'user' ? 'U' : 'AI'}</div>
                <div class="bubble">
                    <div class="text">${formattedText}</div>
                    ${thinkingHtml}
                </div>
            `;

            chatBucket.appendChild(row);
            chatBucket.scrollTop = chatBucket.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        init();
    </script>
</body>

</html>
